spring:
  application:
    name: connectify-backend
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/connectify}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
    org.flywaydb: INFO
